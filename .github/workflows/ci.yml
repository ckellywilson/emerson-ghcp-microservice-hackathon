name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  validate-branch-name:
    name: Validate branch name
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming convention
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch: $BRANCH"
          if echo "$BRANCH" | grep -qE '^(feature|fix|chore|docs|refactor|test|hotfix|copilot)/.+'; then
            echo "✅ Branch name '$BRANCH' matches the required naming convention."
          else
            echo "❌ Branch name '$BRANCH' does not match the required naming convention."
            echo "Allowed prefixes: feature/, fix/, chore/, docs/, refactor/, test/, hotfix/, copilot/"
            exit 1
          fi

  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    needs: validate-branch-name
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore monolith/ContosoUniversity.sln

      - name: Build
        run: dotnet build monolith/ContosoUniversity.sln --no-restore

      - name: Test
        run: dotnet test monolith/ContosoUniversity.sln --no-build --verbosity normal
